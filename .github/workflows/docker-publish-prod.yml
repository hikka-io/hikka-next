name: Publish Docker Image

on:
    push:
        tags: ['v*.*.*']

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}

jobs:
    build:
        name: Build and push Docker image

        runs-on: ubuntu-latest
        permissions:
            contents: read
            packages: write
            id-token: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            # https://github.com/sigstore/cosign-installer
            - name: Install cosign
              uses: sigstore/cosign-installer@v3.5.0
              with:
                  cosign-release: 'v2.3.0'

            # https://github.com/docker/setup-buildx-action
            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3.5.0

            # https://github.com/docker/login-action
            - name: Log into registry ${{ env.REGISTRY }}
              uses: docker/login-action@v3.3.0
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ github.token }}

            - name: Delete old package versions (keep dev)
              env:
                  GH_TOKEN: ${{ github.token }}
              run: |
                  # Get all tagged versions as "id tags" lines (newest first)
                  # Skip dev-tagged and untagged versions, keep 3 newest prod, delete the rest
                  VERSIONS=$(gh api \
                    "orgs/${{ github.repository_owner }}/packages/container/hikka-next/versions" \
                    --paginate --jq '.[] | select(.metadata.container.tags | length > 0) | "\(.id) \(.metadata.container.tags | join(","))"')

                  # Filter out dev versions, skip first 3 (newest), collect the rest for deletion
                  DELETE_IDS=$(echo "$VERSIONS" | { grep -vw "dev" || true; } | tail -n +4 | awk '{print $1}')

                  if [ -z "$DELETE_IDS" ]; then
                    echo "No old versions to delete"
                  else
                    echo "$DELETE_IDS" | while read -r id; do
                      echo "Deleting version $id"
                      gh api --method DELETE \
                        "orgs/${{ github.repository_owner }}/packages/container/hikka-next/versions/$id" || echo "Failed to delete version $id"
                    done
                  fi

            # https://github.com/docker/metadata-action
            - name: Extract Docker metadata
              id: meta
              uses: docker/metadata-action@v5.5.1
              with:
                  images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
                  tags: |
                      type=semver,pattern={{version}}
                      type=semver,pattern={{major}}.{{minor}}
                      type=raw,value=latest

            # https://github.com/docker/build-push-action
            - name: Build and push Docker image
              id: build-and-push
              uses: docker/build-push-action@v6.5.0
              with:
                  context: .
                  push: true
                  file: Dockerfile.prod
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            # https://github.com/sigstore/cosign
            - name: Sign the published Docker image
              env:
                  TAGS: ${{ steps.meta.outputs.tags }}
                  DIGEST: ${{ steps.build-and-push.outputs.digest }}
              run: echo "${TAGS}" | xargs -I {} cosign sign --yes {}@${DIGEST}
